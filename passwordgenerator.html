<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="main.css">
    <link rel="shortcut icon" href="icons/pass.png" type="image/x-icon">
    <style>
        html,body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 102vh;
        }

        body {
            background-image: url("images/cover.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: black;
            overflow-y: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            background: yellowgreen;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8.5px);
            border: 1px solid rgba(196, 186, 186, 0.22);
        }

        .line {
            display:inline-block;
            border-bottom:2px #5B3400 solid;
            margin-left:5px;
            width:100%;
        }

        .container h2 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;
        }

        .settings label {
            display: block;
            margin-bottom: 10px;
        }

        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #00791a;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .homeBtn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #00791a;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .homeBtn:hover {
            background-color: cornflowerblue;
            color: #fff;
        }

        button:hover, button:focus {
            background-color: #008d34;
            outline: none;
        }

        button:active {
            background-color: #00cb0a;
            transform: translateY(2px);
        }

        #password {
            margin-top: 20px;
            margin-bottom: 15px;
            font-size: 20px;
            width: 95%;
            padding: 10px;
            height: 40px;
            background-color: white;
            color: black;
            border: 1px solid #555;
            border-radius: 5px;
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Random Password Generator<span class="line"></span></h2>
        <div class="settings">
            <label for="length">Password Length:
                <input type="number" id="length" value="12" min="4" max="32">
            </label>
            <label for="uppercase">
                <input type="checkbox" id="uppercase" checked> Uppercase
            </label>
            <label for="numbers">
                <input type="checkbox" id="numbers" checked> Numbers
            </label>
            <label for="specialChars">
                <input type="checkbox" id="specialChars" checked> Special Characters
            </label>
        </div>
        <button id="generate">Generate Password</button>
        <input type="text" id="password" readonly>
        <button id="copy">Copy</button>
        <button id="clear">Clear</button>
        <button id="home" class="homeBtn">Go Home</button>
    </div>
    <script>
        function generate() {
            const length = document.getElementById('length').value;
            const useUppercase = document.getElementById('uppercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSpecialChars = document.getElementById('specialChars').checked;

            const password = generatePassword(length, useUppercase, useNumbers, useSpecialChars);
            document.getElementById('password').value = password;
        }

        function generatePassword(length, useUppercase, useNumbers, useSpecialChars) {
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const numbers = '0123456789';
            const specialChars = '!@#$%^&*()_-+=<>?/[]{}|';
            let characters = lowercase;
            if (useUppercase) characters += uppercase;
            if (useNumbers) characters += numbers;
            if (useSpecialChars) characters += specialChars;

            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                password += characters[randomIndex];
            }
            return password;
        }

        function copyToClipboard() {
            const passwordField = document.getElementById('password');
            passwordField.select();
            document.execCommand('copy');
            alert('Password copied to clipboard!');
        }

        function clearField() {
            document.getElementById('password').value = '';
        }

        function goHome() {
            window.location.href="index.html";
        }

        document.getElementById('generate').addEventListener('click', generate);
        document.getElementById('copy').addEventListener('click', copyToClipboard);
        document.getElementById('clear').addEventListener('click', clearField);
        document.getElementById('home').addEventListener('click', goHome);
    </script>
</body>
</html>
