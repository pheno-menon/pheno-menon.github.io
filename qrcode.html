<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="shortcut icon" href="icons/qrcode.png" type="image/x-icon">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url("cover.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: black;
            overflow-y: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            background: yellowgreen;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8.5px);
            border: 1px solid rgba(196, 186, 186, 0.22);
            transition: height 0.2s ease;
        }

        .container.active {
            height: auto;
        }

        .header {
            text-align: center;
            font-size: 25px;
            font-weight: 100;
            margin-bottom: 20px;
        }

        .line {
            display:inline-block;
            border-bottom:2px #5B3400 solid;
            margin-left:5px;
            width:100%;
        }

        .container h2 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 15px;
        }

        .form :where(input, button) {
            /* width: calc(100% - 10px); */
            height: 45px;
            border: none;
            outline: none;
            border-radius: 5px;
            transition: 0.1s ease;
        }

        .form input {
            width: 98%;
            font-size: 16px;
            padding: 0 10px;
            border: 1px solid #999;
        }

        .form input:focus {
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.13);
        }

        .form input::placeholder {
            color: #999;
        }

        .qr-code {
            opacity: 1;
            display: flex;
            padding: 20px 0;
            border-radius: 5px;
            align-items: center;
            pointer-events: none;
            justify-content: center;
            border: 1px solid #105d00;
            overflow: hidden;
        }

        .container.active .qr-code {
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.5s 0.05s ease;
        }

        .qr-code img {
            width: 150px;
        }

        .mybtn {
            padding: 10px 10px;
            display: flex;
            justify-content: center;
        }

        .controlBtn,
        .myreSet {
            /* width: 60%;
            height: 36px; */
            width: 30%;
            margin-bottom: 10px;
            background-color: #00791a;
            color: #ffffff;
            border-radius: 5px;
            border: none;
            outline: none;
            cursor: pointer;
            margin: 5px;
            font-size: 15px;
        }

        .homeBtn {
            display: block;
            width: 100%;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
        }

        .homeBtn:hover {
            background-color: cornflowerblue;
            color: #ffffff;
        }

        .controlBtn:hover,
        .myreSet:hover {
            background-color: #00cb0a;
        }

        .result {
            margin: 10px 0;
            padding: 5px;
        }

        @media (max-width: 480px) {
            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form">
            <div class="header"><h2>QR Code Generator<span class="line"></span></h2></div>
            <input type="text" id="textInput" spellcheck="false" placeholder="Enter text or URL">
            <div class="mybtn">
                <button class="controlBtn" onclick="generateQr()">Generate QR Code</button>
                <button class="myreSet" onclick="reset()">Reset</button>
                <!-- <button class="controlBtn" id="downloadQr">Download</button> -->
                <button class="controlBtn" id="downloadQr" onclick="downloadQRCode()">Download</button>
            </div>
            <div class="result">
                <div class="qr-code" id="qrcode"></div>
            </div>
            <button class="homeBtn" onclick="goHome()">Home</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        function generateQr() {
            let userInput = document.querySelector("#textInput").value.trim();
            let qrCodeDiv = document.getElementById("qrcode");
            let wrapper = document.querySelector(".container");

            if (userInput === "") {
                alert("Input field cannot be empty");
                qrCodeDiv.innerHTML = ''; // Clear previous QR code
            } else {
                qrCodeDiv.innerHTML = ''; // Clear previous QR code
                new QRCode(qrCodeDiv, userInput);

                // Adjust the wrapper's height dynamically
                let qrCodeHeight = qrCodeDiv.offsetHeight;
                wrapper.style.height = (qrCodeHeight + 200) + "px";
            }
        }

        function reset() {
            document.querySelector("#textInput").value = ''; // Clear input
            document.getElementById("qrcode").innerHTML = ''; // Clear QR code
            document.querySelector(".container").style.height = "347px"; // Reset wrapper height
        }

        // Add this function to your existing JavaScript code
        function downloadQRCode() {
            const qrCodeDiv = document.getElementById("qrcode");

            // Convert the QR code div to an image
            const qrCodeImage = new Image();
            qrCodeImage.src = qrCodeDiv.firstChild.toDataURL(); // Convert QR code div to data URL

            // Create a link element to trigger the download
            const downloadLink = document.createElement("a");
            downloadLink.href = qrCodeImage.src;
            downloadLink.download = "generated_qr_code.png"; // Set the file name here

            // Simulate click to trigger the download
            document.body.appendChild(downloadLink); // Append link to body
            downloadLink.click(); // Simulate click
            document.body.removeChild(downloadLink); // Remove link from body after download
        }

        function goHome() {
            window.location.href="index.html";
        }

        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.keyCode == 13) {
                if (document.querySelector("#textInput").value.trim() != "") {
                    generateQr();
                }
                else {
                    alert("Input field cannot be empty");
                    reset();
                }
            }
        })
    </script>
</body>
</html>
